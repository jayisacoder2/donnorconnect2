name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.1

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store (restore)
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        id: install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        if: ${{ steps.install.outcome == 'success' }}
        run: npx prisma generate

      - name: Run ESLint
        if: ${{ steps.install.outcome == 'success' }}
        run: pnpm lint

      - name: Build
        if: ${{ steps.install.outcome == 'success' }}
        run: pnpm build

      - name: Save pnpm cache
        if: always() && steps.install.outcome == 'success' && steps.cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}

  deploy:
    name: Build Docker + Deploy to EC2
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/donorconnect:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/donorconnect:cache,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/donorconnect:latest
            ghcr.io/${{ github.repository_owner }}/donorconnect:${{ github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Find or launch EC2 instance
        id: ec2
        run: |
          set -euo pipefail
          APP_TAG="donorconnect-app"

          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:App,Values=$APP_TAG" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "No running instance found — launching a new one..."
            INSTANCE_ID=$(aws ec2 run-instances \
              --image-id "${{ secrets.AMI_ID }}" \
              --instance-type t3.small \
              --key-name "${{ secrets.EC2_KEY_NAME }}" \
              --security-group-ids "${{ secrets.EC2_SECURITY_GROUP_ID }}" \
              --subnet-id "${{ secrets.EC2_SUBNET_ID }}" \
              --tag-specifications \
                "ResourceType=instance,Tags=[{Key=App,Value=$APP_TAG},{Key=Name,Value=$APP_TAG}]" \
              --query "Instances[0].InstanceId" \
              --output text)
            echo "Launched: $INSTANCE_ID"
          else
            echo "Reusing existing instance: $INSTANCE_ID"
          fi

          echo "INSTANCE_ID=$INSTANCE_ID" >> "$GITHUB_ENV"

      - name: Wait for instance status OK
        run: |
          echo "Waiting for $INSTANCE_ID to pass status checks..."
          aws ec2 wait instance-status-ok --instance-ids "$INSTANCE_ID"

      - name: Get EC2 public IP
        run: |
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          echo "EC2_HOST=$PUBLIC_IP" >> "$GITHUB_ENV"
          echo "Instance IP: $PUBLIC_IP"

      - name: Open ports in security group
        id: open-ssh
        run: |
          RUNNER_IP=$(curl -sf https://checkip.amazonaws.com)
          echo "RUNNER_IP=$RUNNER_IP" >> "$GITHUB_ENV"
          # Temporarily open port 22 for this runner
          aws ec2 authorize-security-group-ingress \
            --group-id "${{ secrets.EC2_SECURITY_GROUP_ID }}" \
            --protocol tcp --port 22 --cidr "${RUNNER_IP}/32" || true
          # Permanently open port 3000 for the public (0.0.0.0/0)
          aws ec2 authorize-security-group-ingress \
            --group-id "${{ secrets.EC2_SECURITY_GROUP_ID }}" \
            --protocol tcp --port 3000 --cidr "0.0.0.0/0" || true
          echo "Opened port 22 for $RUNNER_IP and port 3000 for public"

      - name: Wait for SSH to be available
        run: |
          echo "Waiting for SSH on $EC2_HOST port 22..."
          timeout 180 bash -c "until nc -z \$EC2_HOST 22; do sleep 5; done"
          echo "SSH is open."

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/donorconnect:latest
          ACTOR: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ env.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DATABASE_URL,IMAGE,ACTOR,TOKEN
          script: |
            # Install Docker if missing (use sudo throughout to avoid group reloading issues)
            if ! command -v docker &>/dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y docker.io
              sudo systemctl enable --now docker
            fi

            # Pull latest image (always use sudo so group membership doesn't matter)
            echo "$TOKEN" | sudo docker login ghcr.io -u "$ACTOR" --password-stdin
            sudo docker pull "$IMAGE"

            # Replace running container
            sudo docker stop donorconnect-app 2>/dev/null || true
            sudo docker rm   donorconnect-app 2>/dev/null || true

            # Confirm DATABASE_URL is set
            if [ -z "$DATABASE_URL" ]; then
              echo "ERROR: DATABASE_URL is empty — set it in GitHub Secrets"
              exit 1
            fi
            echo "DATABASE_URL is set (starts with: ${DATABASE_URL:0:30}...)"

            sudo docker run -d \
              --name donorconnect-app \
              --restart unless-stopped \
              -p 3000:3000 \
              -e DATABASE_URL="$DATABASE_URL" \
              -e NODE_ENV=production \
              -e HOSTNAME=0.0.0.0 \
              -e PORT=3000 \
              "$IMAGE"

            # Wait for app to fully start then print logs
            sleep 15
            echo "=== Container status after 15s ==="
            sudo docker ps -a | grep donorconnect-app
            echo "=== Container logs ==="
            sudo docker logs donorconnect-app --tail 80

      - name: Revoke port 22 for this runner
        if: always()
        run: |
          if [ -n "${RUNNER_IP:-}" ]; then
            aws ec2 revoke-security-group-ingress \
              --group-id "${{ secrets.EC2_SECURITY_GROUP_ID }}" \
              --protocol tcp --port 22 --cidr "${RUNNER_IP}/32" || true
            echo "Revoked SSH access for $RUNNER_IP"
          fi